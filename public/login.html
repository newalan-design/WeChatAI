<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 微信公众号文章改写助手</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
        }

        .login-wrapper {
            display: flex;
            width: 100%;
            min-height: 100vh;
        }

        /* 左侧内容区 */
        .left-content {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px;
            position: relative;
            overflow: hidden;
        }

        .left-content::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .left-content-inner {
            position: relative;
            z-index: 1;
            max-width: 600px;
        }

        .app-title {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .app-subtitle {
            font-size: 1.5rem;
            opacity: 0.9;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .feature-list {
            list-style: none;
            margin-bottom: 40px;
        }

        .feature-list li {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            font-size: 1.1rem;
            opacity: 0.95;
        }

        .feature-list li i {
            font-size: 1.5rem;
            margin-right: 15px;
            background: rgba(255, 255, 255, 0.2);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 右侧登录区 */
        .right-login {
            width: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
        }

        .login-card {
            width: 100%;
            max-width: 450px;
        }

        .login-title {
            font-size: 2rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .login-subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            color: #333;
            font-weight: 500;
            margin-bottom: 10px;
            display: block;
        }

        .form-control {
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            padding: 14px 18px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            outline: none;
        }

        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 14px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            width: 100%;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            color: white;
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .alert {
            border-radius: 10px;
            border: none;
            padding: 15px;
            margin-bottom: 25px;
        }

        .divider {
            text-align: center;
            margin: 30px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: #e8e8e8;
        }

        .divider span {
            background: white;
            padding: 0 20px;
            color: #999;
            font-size: 0.9rem;
            position: relative;
        }

        .info-text {
            text-align: center;
            color: #999;
            font-size: 0.9rem;
            margin-top: 20px;
        }

        .info-text i {
            color: #667eea;
        }

        /* 响应式设计 */
        @media (max-width: 992px) {
            .login-wrapper {
                flex-direction: column;
            }

            .left-content {
                width: 100%;
                padding: 40px 30px;
                min-height: auto;
            }

            .right-login {
                width: 100%;
                padding: 40px 30px;
            }

            .app-title {
                font-size: 2.5rem;
            }

            .app-subtitle {
                font-size: 1.2rem;
            }
        }

        @media (max-width: 576px) {
            .left-content {
                padding: 30px 20px;
            }

            .right-login {
                padding: 30px 20px;
            }

            .app-title {
                font-size: 2rem;
            }

            .feature-list li {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <!-- 左侧内容区 -->
        <div class="left-content">
            <div class="left-content-inner">
                <h1 class="app-title">
                    <i class="bi bi-robot"></i> 微信公众号文章改写助手
                </h1>
                <p class="app-subtitle">AI 智能改写 · 自动排版 · 一键发布</p>
                
                <ul class="feature-list">
                    <li>
                        <i class="bi bi-lightning-charge"></i>
                        <span>智能改写：大语言模型技术，高质量内容生成</span>
                    </li>
                    <li>
                        <i class="bi bi-file-earmark-text"></i>
                        <span>自动排版：优化文章格式，提升阅读体验</span>
                    </li>
                    <li>
                        <i class="bi bi-cloud-download"></i>
                        <span>文章爬取：一键抓取公众号文章内容</span>
                    </li>
                    <li>
                        <i class="bi bi-share"></i>
                        <span>一键发布：自动推送至微信公众号后台</span>
                    </li>
                </ul>
            </div>
        </div>

        <!-- 右侧登录区 -->
        <div class="right-login">
            <div class="login-card">
                <h2 class="login-title">欢迎回来</h2>
                <p class="login-subtitle">登录您的账户开始使用</p>
                
                <div id="alert"></div>
                
                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label">用户名</label>
                        <input type="text" class="form-control" id="username" placeholder="请输入用户名" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">密码</label>
                        <input type="password" class="form-control" id="password" placeholder="请输入密码" required>
                    </div>
                    <button type="submit" class="btn btn-login">
                        <i class="bi bi-box-arrow-in-right"></i> 登录
                    </button>
                </form>

                <div class="divider">
                    <span>默认账号信息</span>
                </div>

                <p class="info-text">
                    <i class="bi bi-info-circle"></i> 默认管理员账号：admin / admin
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="login.js"></script>
</body>
</html>
